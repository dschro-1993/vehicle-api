name: CI

on:
  - push

jobs:
  ci:
    runs-on: ubuntu-20.04
    environment: qa # TBD
    services:
      dynamodb:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000
    container: ghcr.io/dschro-1993/vehicle-api:latest # Has Poetry pre-installed
    steps:
      - uses: actions/checkout@v3
      - name: Installation
        run: |
          poetry install
      - name: Run unit-tests
        run: |
          poetry run coverage run -m pytest tests/unit
          poetry run coverage report -m
      - name: Run intr-tests
        run: |
          poetry run coverage run -m pytest tests/intr
          poetry run coverage report -m

name: CI

on:
  - push

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      dynamodb:
        image: amazon/dynamodb-local
        ports:
          - 8000:8000
    env: # => To make BOTO3 happy
      AWS_ACCESS_KEY_ID:     AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_DEFAULT_REGION:    eu-west-1
      AWS_DEFAULT_OUTPUT:    json
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: 3.9 # => Required by λ-Service
          cache: poetry
      - name: Install Poetry
        run: |
          pipx install poetry==1.4.0
      - name: Install all (Dev-)Dependencies
        run: |
          poetry install
      - name: Run pylint
        run: |
          poetry run pylint vehicle_api/
      - name: Run unit-tests
        run: |
          poetry run coverage run -m pytest tests/unit
          poetry run coverage report -m
      - name: Run intr-tests
        run: |
          poetry run coverage run -m pytest tests/intr
          poetry run coverage report -m

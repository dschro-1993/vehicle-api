name: cicd-prod

on:
  # workflow_dispatch: <>
  pull_request:
  push:
    branches:
      - main

permissions:
  pull-requests: write
  id-token:      write
  contents:      write

environment: prod

jobs:
  ci-prod:
    uses: dschro-1993/vehicle-api/.github/workflows/ci.yml@0.1.0
  cd-prod:
    uses: dschro-1993/vehicle-api/.github/workflows/cd.yml@0.1.0
    with:
      working-directory: .terraform/prod
    secrets: inherit
    needs:   ci-prod
